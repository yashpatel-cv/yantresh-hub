# yantresh-hub — runs Caddy + one container per project, all pulled from
# GHCR. The VPS only ever `docker compose pull` — images are built by each
# project's own CI (see DEPLOY.md). Adding a project = one service block
# here + one Caddyfile block + one ADDRESS line in .env.

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      PORTFOLIO_ADDRESS: ${PORTFOLIO_ADDRESS}
      YANTRESH_ADDRESS: ${YANTRESH_ADDRESS}
      SROTANTRA_ADDRESS: ${SROTANTRA_ADDRESS}
      SHOP_API_ADDRESS: ${SHOP_API_ADDRESS}
      SHOP_ADMIN_ADDRESS: ${SHOP_ADMIN_ADDRESS}
      COMMERCE_STOREFRONT_ADDRESS: ${COMMERCE_STOREFRONT_ADDRESS}
      DEMO_STORE_ADDRESS: ${DEMO_STORE_ADDRESS}
      STOREFRONT_TLS_ASK_URL: ${STOREFRONT_TLS_ASK_URL}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [edge]
    # Caddy's admin API (localhost:2019) answers only when the server is up
    # and the config loaded. busybox wget ships in the alpine image.
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:2019/config/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  portfolio:
    image: ghcr.io/${GHCR_OWNER}/patel-portfolio:${PORTFOLIO_IMAGE_TAG:-main}
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks: [edge]
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  yantresh-api:
    image: ghcr.io/${GHCR_OWNER}/yantresh-os:${YANTRESH_IMAGE_TAG:-main}
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    restart: unless-stopped
    environment:
      YANTRESH_API_KEY: ${YANTRESH_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
    volumes:
      - yantresh_state:/app/.yantresh
      - yantresh_workspace:/app/workspace
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks: [edge]
    # /healthz stays 200 even on a blown fuse (a correct, bounded state).
    # No curl/wget in the image — probe with the bundled python, matching
    # the Dockerfile's baked HEALTHCHECK.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request as u; u.urlopen('http://127.0.0.1:8000/healthz', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  srotantra-api:
    image: ghcr.io/${GHCR_OWNER}/srotantra:${SROTANTRA_IMAGE_TAG:-main}
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    restart: unless-stopped
    environment:
      SROTANTRA_DB: /data/srotantra.db
    volumes:
      - srotantra_data:/data
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks: [edge]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request as u; u.urlopen('http://127.0.0.1:8000/healthz', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 192M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  yantresh-commerce-postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-yantresh_control}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - yantresh-commerce-postgres:/var/lib/postgresql/data
    networks: [edge]

  yantresh-commerce-redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - yantresh-commerce-redis:/data
    networks: [edge]

  yantresh-commerce-storefront:
    image: ${STOREFRONT_IMAGE}
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    restart: unless-stopped
    depends_on:
      - yantresh-commerce-postgres
      - yantresh-commerce-redis
    environment:
      DATABASE_URL: ${DATABASE_URL}
      MEDUSA_DATABASE_URL: ${MEDUSA_DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SECRET_MASTER_KEY: ${SECRET_MASTER_KEY}
    networks: [edge]

  yantresh-commerce-admin:
    image: ${ADMIN_IMAGE}
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    restart: unless-stopped
    depends_on:
      - yantresh-commerce-postgres
      - yantresh-commerce-redis
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SECRET_MASTER_KEY: ${SECRET_MASTER_KEY}
    networks: [edge]

  yantresh-commerce-medusa:
    image: ${MEDUSA_IMAGE}
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    restart: unless-stopped
    depends_on:
      - yantresh-commerce-postgres
      - yantresh-commerce-redis
    environment:
      DATABASE_URL: ${MEDUSA_DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    networks: [edge]

  yantresh-commerce-worker:
    image: ${WORKER_IMAGE}
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    restart: unless-stopped
    depends_on:
      - yantresh-commerce-postgres
      - yantresh-commerce-redis
    environment:
      DATABASE_URL: ${DATABASE_URL}
      MEDUSA_DATABASE_URL: ${MEDUSA_DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SECRET_MASTER_KEY: ${SECRET_MASTER_KEY}
    networks: [edge]

networks:
  edge:

volumes:
  caddy_data:
  caddy_config:
  yantresh_state:
  yantresh_workspace:
  srotantra_data:
  yantresh-commerce-postgres:
  yantresh-commerce-redis:
