# yantresh-hub — runs Caddy + one container per project, all pulled from
# GHCR. The VPS only ever `docker compose pull` — images are built by each
# project's own CI (see DEPLOY.md). Adding a project = one service block
# here + one Caddyfile block + one ADDRESS line in .env.

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      PORTFOLIO_ADDRESS: ${PORTFOLIO_ADDRESS}
      YANTRESH_ADDRESS: ${YANTRESH_ADDRESS}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [edge]
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  portfolio:
    image: ghcr.io/${GHCR_OWNER}/patel-portfolio:${PORTFOLIO_IMAGE_TAG:-main}
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks: [edge]
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  yantresh-api:
    image: ghcr.io/${GHCR_OWNER}/yantresh-os:${YANTRESH_IMAGE_TAG:-main}
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    restart: unless-stopped
    environment:
      YANTRESH_API_KEY: ${YANTRESH_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
    volumes:
      - yantresh_state:/app/.yantresh
      - yantresh_workspace:/app/workspace
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks: [edge]
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

networks:
  edge:

volumes:
  caddy_data:
  caddy_config:
  yantresh_state:
  yantresh_workspace:
